@if (!appDataService.connection.tor) {
  <div id="PrivacyBadge" class="bg-dark text-white p-2 mb-3 rounded shadow-sm" style="border-left: 4px solid #00c853; font-size: 0.85rem;">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 px-1">
      
      <div id="PrivacyBadgeTextBox" class="flex-grow-1">
        <span class="text-success fw-bold"><i class="fas fa-user-shield me-1"></i> Safe & Confidential:</span>
        <span>Your identity is completely protected. This portal ensures your submission remains private.</span>
        <span class="text-white-50 ms-2 font-monospace d-block d-lg-inline border-lg-start border-secondary ps-lg-2">/ ምስጢርዎ የተጠበቀ ነው፡ ማንነትዎ ሳይገለጽ መልዕክትዎን መላክ ይችላሉ።</span>
      </div>

      <div>
        <a class="btn btn-xs btn-outline-light py-0 px-2 fw-semibold" style="font-size: 0.75rem;" href="https://www.torproject.org/download/" target="_blank">
          Maximize Privacy / ቶርን ያውርዱ
        </a>
      </div>

    </div>
  </div>
}
